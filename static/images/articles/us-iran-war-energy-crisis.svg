    </g>
    <g>
      <rect x="838" y="452" width="248" height="96" rx="12" fill="#284653"/>
      <text x="962" y="491" text-anchor="middle" font-size="22">Negotiation</text>
      <text x="962" y="521" text-anchor="middle" font-size="22">endgame</text>
    </g>
  </g>

  <g fill="#f8f4e3" opacity=".9">
    <path d="M406 286 h92 l22 18 h-136 z"/>
    <rect x="422" y="266" width="52" height="20" rx="3"/>
    <path d="M792 326 h104 l24 18 h-152 z"/>
    <rect x="812" y="302" width="54" height="24" rx="3"/>
